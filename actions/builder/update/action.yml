name: 'Generate Builder.toml'

description: |
  This action updates the builder.toml with any new dependency versions.

inputs:
  token:
    description: 'Github Access Token used to make the request'
    required: true
  filename:
    description: 'Name of the builder.toml file to update'
    required: false
    default: 'builder.toml'
  jam_version:
    description: 'Jam version to install (e.g. 2.8.0). Use latest or omit to resolve from the GitHub API.'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Update Builder
      shell: bash
      run: |
        bash "${{ github.action_path }}/entrypoint" \
          --token "${{ inputs.token }}" \
          --filename "${{ inputs.filename }}" \
          --jam-version "${{ inputs.jam_version }}"
